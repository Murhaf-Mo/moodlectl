name: Build & Release

# Only triggers when pushing to a release/v* branch, never on master commits.
# To release v1.0.0:
#   git checkout -b release/v1.0.0
#   # bump version in pyproject.toml to 1.0.0
#   git commit -am "Release v1.0.0"
#   git push origin release/v1.0.0
on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write  # required to create a GitHub Release

jobs:
  # ── Gate: tests must pass before we build anything ─────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest

  # ── Build Windows installer ─────────────────────────────────────────────────
  build:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from branch name
        id: ver
        shell: pwsh
        run: |
          $branch  = "${{ github.ref_name }}"          # release/v1.0.0
          $version = $branch -replace '^release/v', '' # 1.0.0
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all dependencies + PyInstaller
        run: pip install -e ".[analytics,browser]" pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller moodlectl.spec

      - name: Build Windows installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ steps.ver.outputs.version }}" `
            installer\moodlectl.iss

      - name: Create GitHub Release and attach installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: moodlectl v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            **One-liner (paste in PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/Murhaf-Mo/moodlectl/master/install.ps1 | iex
            ```

            Or download `moodlectl-setup.exe` below and run it directly.

            After installing, open a **new** terminal and run:
            ```
            moodlectl auth login
            ```
          files: installer/Output/moodlectl-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
