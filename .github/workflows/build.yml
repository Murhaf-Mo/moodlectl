name: Build & Release

# Only triggers when pushing to a release/v* branch, never on master commits.
# To release v1.0.0:
#   git checkout -b release/v1.0.0
#   # bump version in pyproject.toml to 1.0.0
#   git commit -am "Release v1.0.0"
#   git push origin release/v1.0.0
on:
  push:
    branches:
      - "release/v*"

permissions:
  contents: write  # required to create a GitHub Release

jobs:
  # ── Gate 1: unit tests + lint must pass before we build anything ──────────-
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest

  # ── Gate 2: end-to-end suite against the live school.moodledemo.net demo ──-
  # Uses form login with the public demo creds — no repo secrets needed.
  # The demo can occasionally be wiped or overloaded; if that happens the
  # whole release blocks (intentionally — better to surface a regression
  # than ship an installer that doesn't work against a real Moodle).
  demo-tests:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MOODLE_BASE_URL: https://school.moodledemo.net
      MOODLE_USERNAME: teacher
      MOODLE_PASSWORD: moodle25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,analytics]"

      - name: Authenticate against demo Moodle
        run: moodlectl auth login

      - name: End-to-end demo suite
        run: pytest -m demo -v

  # ── Extract version (shared by both build jobs) ────────────────────────────
  version:
    needs: [ test, demo-tests ]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Extract version from branch name
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#release/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Build Windows installer ─────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install all dependencies + PyInstaller
        run: pip install -e ".[analytics,browser]" pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller moodlectl.spec

      - name: Build Windows installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="${{ needs.version.outputs.version }}" `
            installer\moodlectl.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: installer/Output/moodlectl-setup.exe

  # ── Build macOS binary ──────────────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install all dependencies + PyInstaller
        run: pip install -e ".[analytics,browser]" pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller moodlectl.spec

      - name: Package as tar.gz
        run: |
          cd dist
          tar -czf moodlectl-macos.tar.gz moodlectl/

      - name: Upload macOS binary
        uses: actions/upload-artifact@v5
        with:
          name: macos-binary
          path: dist/moodlectl-macos.tar.gz

  # ── Publish GitHub Release with both installers ────────────────────────────
  release:
    needs: [ version, build-windows, build-macos ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: windows-installer
          path: ./artifacts

      - uses: actions/download-artifact@v6
        with:
          name: macos-binary
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: moodlectl v${{ needs.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            **Windows** — paste in PowerShell:
            ```powershell
            irm https://raw.githubusercontent.com/Murhaf-Mo/moodlectl/master/install.ps1 | iex
            ```

            **macOS / Linux** — paste in Terminal:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Murhaf-Mo/moodlectl/master/install.sh | bash
            ```

            Or download the files below directly.

            After installing, open a **new** terminal and run:
            ```
            moodlectl auth login
            ```
          files: |
            artifacts/moodlectl-setup.exe
            artifacts/moodlectl-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
